</Sh>);

if(pg==="editlocs") return (<Sh pg={pg} sp={sPg}><button onClick={()=>sPg("home")} style={{background:"none",border:"none",color:ts,fontSize:14,cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif",marginTop:16,marginBottom:12}}>← 返回</button><div style={{fontSize:20,fontWeight:900,marginBottom:8}}>管理常用地點</div><div style={{fontSize:12,color:ts,marginBottom:16}}>常用地點讓你快速切換位置，系統會用該位置計算餐廳距離</div>{sl.map((loc,i)=> <div key={i} style={{...crd,marginBottom:8,padding:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:600,fontSize:14}}>{loc.label}</div><div style={{fontSize:12,color:ts}}>{loc.addr}</div></div><button onClick={()=>sSl(prev=>prev.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:dg,fontSize:12,cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif"}}>刪除</button></div></div>)}<div style={{...crd,marginTop:12}}><div style={{fontSize:13,fontWeight:600,marginBottom:4}}>新增常用地點</div><div style={{fontSize:11,color:ts,marginBottom:8}}>輸入名稱和地址，座標會使用你目前選定的位置。建議先用GPS定位或選擇附近地點後再新增。</div><input value={nlN} onChange={e=>setNlN(e.target.value)} placeholder="名稱（如：健身房、學校）" style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid "+cb,borderRadius:8,padding:"8px 12px",color:tp,fontSize:13,outline:"none",marginBottom:6,boxSizing:"border-box"}}/><input value={nlA} onChange={e=>setNlA(e.target.value)} placeholder="地址（如：忠孝東路四段100號）" style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid "+cb,borderRadius:8,padding:"8px 12px",color:tp,fontSize:13,outline:"none",marginBottom:8,boxSizing:"border-box"}}/><button onClick={()=>{if(!nlN.trim()){alert("請填寫名稱");return;}sSl(prev=>[...prev,{label:nlN.trim(),addr:nlA||"",lat:ul?.lat||25.04,lng:ul?.lng||121.55}]);setNlN("");setNlA("");alert("已新增！");}} style={{...bs(),width:"100%",fontSize:13}}>新增常用地點</button></div></Sh>);

// === SETTINGS ===
if(pg==="settings"){const av=CT.filter(c=>!lk.includes(c.k));return (<Sh pg={pg} sp={sPg}><div style={{fontSize:20,fontWeight:900,marginTop:16,marginBottom:16}}>設定</div><div style={{display:"flex",background:"rgba(255,255,255,0.06)",borderRadius:12,padding:3,marginBottom:16}}>{["likes","dislikes","cal"].map(t=> <button key={t} onClick={()=>sStb(t)} style={{flex:1,padding:"8px 0",fontSize:13,fontWeight:stb===t?700:400,borderRadius:10,border:"none",background:stb===t?ac:"transparent",color:stb===t?"#fff":ts,cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif"}}>{{likes:"喜歡",dislikes:"不吃",cal:"熱量"}[t]}</button>)}</div>
{stb==="likes"&& <div><div style={{fontSize:13,color:ts,marginBottom:12}}>喜歡的料理(最多5) - 推薦時優先</div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>{CT.map(t2=>{const a=lk.includes(t2.k);return (<button key={t2.k} onClick={()=>{if(a)sLk(p=>p.filter(x=>x!==t2.k));else if(lk.length<5)sLk(p=>[...p,t2.k]);}} style={{...crd,cursor:lk.length>=5&&!a?"not-allowed":"pointer",opacity:lk.length>=5&&!a?0.4:1,textAlign:"center",padding:12,border:a?"2px solid "+ac:"1px solid "+cb,background:a?"rgba(139,92,246,0.15)":cd}}><div style={{fontSize:14,fontWeight:700}}>{t2.l}</div></button>);})}</div></div>}
{stb==="dislikes"&& <div><div style={{fontSize:13,color:ts,marginBottom:12}}>不吃的料理(最多5) - 完全排除</div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>{av.map(t2=>{const a=dk.includes(t2.k);return (<button key={t2.k} onClick={()=>{if(a)sDk(p=>p.filter(x=>x!==t2.k));else if(dk.length<5)sDk(p=>[...p,t2.k]);}} style={{...crd,cursor:dk.length>=5&&!a?"not-allowed":"pointer",opacity:dk.length>=5&&!a?0.4:1,textAlign:"center",padding:12,border:a?"2px solid "+dg:"1px solid "+cb,background:a?"rgba(239,68,68,0.1)":cd}}><div style={{fontSize:14,fontWeight:700}}>{t2.l}</div></button>);})}</div></div>}
{stb==="cal"&& <div><div style={{fontSize:13,color:ts,marginBottom:8}}>每日上限(kcal)</div><div style={{fontSize:11,color:"rgba(167,139,219,0.6)",marginBottom:8}}>建議範圍 1500-2500</div><input type="text" inputMode="numeric" pattern="[0-9]*" value={ct||""} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");if(v===""){sCt(0);}else{sCt(parseInt(v));}}} style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid "+cb,borderRadius:10,padding:"10px 14px",color:tp,fontSize:16,fontWeight:700,outline:"none",boxSizing:"border-box",MozAppearance:"textfield",WebkitAppearance:"none"}}/></div>}
<button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);}} style={{...bs(saved?gn:ac),width:"100%",marginTop:20,padding:14,fontSize:15,borderRadius:14}}>{saved?"已儲存!":"儲存設定"}</button>
</Sh>);}

return (<Sh pg={pg} sp={sPg}><div style={{padding:40,textAlign:"center"}}>載入中...</div></Sh>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
