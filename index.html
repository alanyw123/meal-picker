// FIXED: Wheel respects user preferences (likes boost, dislikes excluded, meal time filter)
const [wheelKey,setWheelKey]=useState(0);
const spW=()=>{
  let types=CT.filter(c=>!dk.includes(c.k));
  if(!types.length||!ul)return;

  let weightedTypes=[...types];
  if(lk.length>0){
    lk.forEach(liked=>{
      const found=types.find(t=>t.k===liked);
      if(found){weightedTypes.push(found);weightedTypes.push(found);}
    });
  }

  const chosen=weightedTypes[Math.floor(Math.random()*weightedTypes.length)];
  const ang=360/types.length;
  const ci=types.findIndex(t=>t.k===chosen.k);
  const sectorMid=ci*ang+ang/2;
  const targetAngle=360-sectorMid;
  const spinAngle=360*6+targetAngle;
  // Reset by changing key (forces fresh DOM element), then set angle
  setWheelKey(prev=>prev+1);
  sWa(0);
  setTimeout(()=>{sWa(spinAngle);},30);
  sSpn(true);sWrList([]);sWrType(null);
  setTimeout(()=>{sSpn(false);sWrType(chosen.k);
    const pool=allDB.filter(r=>r.t===chosen.k&&!r.isUser&&!dk.includes(r.t)).map(r=>({...r,dist:gd(ul.lat,ul.lng,r.la,r.lo)})).sort((a,b)=>a.dist-b.dist).slice(0,3);

  },4200);
};

{addS.filter(s=>s.name.includes(ssrch)||s.addr.includes(ssrch)).map((s,i)=> <div key={i} style={{...crd,marginBottom:8,padding:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><Badge t={s.type}/><div style={{fontWeight:600,fontSize:13,marginTop:4}}>{s.name}</div><div style={{fontSize:11,color:ts}}>{s.addr}</div></div><button onClick={()=>sAddS(prev=>prev.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:dg,fontSize:12,cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif"}}>刪除</button></div>)}
